# Earth Koshchei / APT29 / Midnight Blizzard — Rogue RDP Campaign
author: aptwatch-team
source: https://www.trendmicro.com/en_us/research/24/l/earth-koshchei.html
source_name: "Earth Koshchei APT29 Rogue RDP Proxy Campaign (Trend Micro, Dec 2024)"

apt_groups:
  - APT29
  - Midnight Blizzard
  - Earth Koshchei
  - Cozy Bear
  - NOBELIUM
  - Iron Hemlock
  - BlueBravo
  - UNC2452

description: >
  Earth Koshchei (APT29/SVR) rogue RDP proxy campaign targeting NATO/EU governments,
  Ukrainian defense (MFA, MoD), US think-tanks (Brookings, CFR, CEIP, RAND, Heritage),
  and cloud providers. Spear-phishing with malicious .rdp files that establish rogue RDP
  proxy connections for credential/NTLMv2 harvesting, followed by Sliver/Meterpreter C2
  deployment. Campaign active Oct-Nov 2024. 193 phishing domains typosquatting government
  and cloud services across 30+ countries.

