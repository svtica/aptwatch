description: >
  Secret Blizzard (FSB Center 16 / Military Unit 71330 / Turla / KRYPTON / VENOMOUS BEAR)
  deploys custom BlankPage backdoor targeting European ministries of foreign affairs and
  embassies. Two variants: Graph API/OneDrive C2 and HTTP listener on port 443 with
  /OAB/BOOK/ URI pattern. Active since 2023, disclosed March 2026.
  Note: No IPv4 IOCs — C2 uses Microsoft Graph API (legitimate infra). File hashes only.

