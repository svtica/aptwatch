source_name: "Microsoft Threat Intelligence - ClickFix Variant Browser Stealer Campaign"
apt_groups: []
description: >
  ClickFix variant campaign (Feb 2026+) using Win+X, i, Ctrl+V, Enter to launch
  Windows Terminal and execute clipboard-pasted PowerShell. Two attack chains identified:
  (1) DLL sideloading chain delivering Lumma Stealer via Adersoft VbsEdit sideloading
  with Binance Smart Chain Testnet for C2 config retrieval, and (2) MSBuild polyglot
  batch/XML campaign with in-memory DLL loading and sandbox evasion.
  Both chains target Chrome and Edge credential stores via QueueUserAPC-based code injection.

  aptwatch enrichment (2026-03-20): Zero overlap with existing IOC database.
  No IPs, domains, or URLs were previously tracked. No overlap with watched APT subnets.
  Dominant hosting ASN is AS48282 (Hosting technology LTD, Moscow, RU) — 7 of 11 IPs.
  Also seen: AS216071 (SERVERS TECH FZCO, NL) x2, AS210644 (AEZA GROUP LLC, DE) x1,
  AS1897 (NOS COMUNICACOES, PT) x1.

