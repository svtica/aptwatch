# =============================================================

victim_context:
  total_exfiltrated_emails: 2800
  stolen_credential_sets: 240
  silent_forwarding_rules: 140
  harvested_contacts: 11500
  targeted_sectors:
    - "Ukraine regional prosecutors (war crimes investigations)"
    - "Romanian Air Force"
    - "Greece National Defence General Staff"
    - "Serbian Ministry of Defence"
    - "Bulgarian government entities"
  targeted_platforms:
    - "Roundcube Webmail"
    - "SquirrelMail"

