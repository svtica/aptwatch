description: >
  FSB Center 16 (Military Unit 71330). Multi-source IOC collection from Trend Micro
  (Capibar/Kazuar 2023) and Microsoft (Secret Blizzard Dec 2024 + AiTM Jul 2025).
  Capibar: Python backdoor for Ukraine reconnaissance (2023). Kazuar v2: Advanced
  polymorphic .NET backdoor with cloud-based C2. BlankPage: Backdoor using Microsoft
  Graph API C2 via Microsoft 365 targeting EU diplomats. CertificateDB.exe: AiTM
  malware deploying rogue root certificates (Jul 2025). DeliveryCheck: Backdoor via
  ESET Outlook plugin (2023). Storm-0156 infrastructure hijacking campaign documented
  by Microsoft. Targets: foreign affairs ministries, defense, embassies worldwide.
