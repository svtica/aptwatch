source_name: "LAB52 - DRILLAPP: new backdoor targeting Ukrainian entities with possible links to Laundry Bear"

apt_groups:
  - Laundry Bear

description: >
  Campaign targeting Ukrainian entities observed in February 2026, using judicial
  and charity themed lures (Come Back Alive foundation, Starlink, State Audit Service)
  to deploy DRILLAPP, a JavaScript-based backdoor running through Microsoft Edge in
  headless mode. Two variants identified: first uses LNK files, second uses CPL files.
  Backdoor enables file upload/download, microphone recording, webcam capture, and
  screen recording via browser capabilities and Chrome DevTools Protocol.
  Low-confidence attribution to Laundry Bear based on shared TTPs with CERT-UA report.

