name: Seed Database

# =============================================================
# One-time bootstrap workflow to create the apt-intel-db artifact.
#
# USAGE (from the server):
#   1. Install gh CLI:  apt install gh && gh auth login
#   2. Upload DB as a temporary release:
#      gh release create v0.1-seed /opt/apt-intel/database/apt_intel.db \
#        --repo aptwatcher/aptwatch \
#        --title "Initial DB seed" \
#        --notes "Bootstrap database for CI pipeline"
#   3. Go to Actions > Seed Database > Run workflow (tag: v0.1-seed)
#   4. After success, delete the release (contains sensitive data):
#      gh release delete v0.1-seed --repo aptwatcher/aptwatch --yes
#      git push --delete origin v0.1-seed
# =============================================================

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag containing apt_intel.db'
        required: true
        default: 'v0.1-seed'

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download DB from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p database
          gh release download "${{ github.event.inputs.release_tag }}" \
            --repo ${{ github.repository }} \
            --pattern "apt_intel.db" \
            --dir database/

      - name: Verify database
        run: |
          if [ ! -f database/apt_intel.db ]; then
            echo "::error::apt_intel.db not found in release ${{ github.event.inputs.release_tag }}"
            exit 1
          fi
          SIZE=$(du -h database/apt_intel.db | cut -f1)
          echo "Database size: $SIZE"
          sqlite3 database/apt_intel.db "SELECT COUNT(*) FROM ipv4_iocs;" && echo "DB integrity OK" || {
            echo "::error::Database integrity check failed"
            exit 1
          }

      - name: Upload database artifact
        uses: actions/upload-artifact@v5
        with:
          name: apt-intel-db
          path: database/apt_intel.db
          retention-days: 90

      - name: Summary
        run: |
          echo "## Database Seeded" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Source: release \`${{ github.event.inputs.release_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Size: $(du -h database/apt_intel.db | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next: run **Generate Blocklists** or **OSINT Validation** workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Remember to delete the release** (sensitive data):" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "gh release delete ${{ github.event.inputs.release_tag }} --repo ${{ github.repository }} --yes" >> $GITHUB_STEP_SUMMARY
          echo "git push --delete origin ${{ github.event.inputs.release_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
