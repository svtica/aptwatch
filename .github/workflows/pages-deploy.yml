name: Deploy Dashboard to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'blocklists/**'
      - 'iocs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Prepare Pages content
        run: |
          # CNAME for custom domain
          echo "aptwatch.org" > web/CNAME

          # Copy logo assets into web/
          cp aptwatch-logo.svg web/ 2>/dev/null || true
          cp aptwatch-logo.png web/ 2>/dev/null || true

          # Copy blocklists for direct download
          mkdir -p web/blocklists
          cp blocklists/* web/blocklists/ 2>/dev/null || true

          # Copy IOC files
          mkdir -p web/iocs
          cp iocs/*.txt web/iocs/ 2>/dev/null || true
          # Copy Suricata rules
          mkdir -p web/iocs/suricata
          cp iocs/suricata/*.rules web/iocs/suricata/ 2>/dev/null || true

          # Check for web database
          if [ -f web/apt_intel_web.db ]; then
            echo "Web database: $(du -h web/apt_intel_web.db | cut -f1)"
          else
            echo "::warning::No web database found. Dashboard will prompt for manual upload."
          fi

          # Generate feeds directory listing
          cat > web/feeds.html << 'FEEDSEOF'
          <!DOCTYPE html>
          <html>
          <head><title>APT Intel Feeds</title>
          <style>
            body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; background: #1a1a2e; color: #e0e0e0; }
            h1 { color: #00d4ff; }
            a { color: #00ff88; }
            .section { margin: 20px 0; padding: 15px; background: #16213e; border-radius: 8px; }
            .file { margin: 5px 0; }
          </style>
          </head>
          <body>
          <h1>APT Intelligence Feeds</h1>
          <div class="section">
            <h2>Blocklists (Firehol .netset format)</h2>
            <div class="file"><a href="blocklists/aptw-apt-ips-high.netset">aptw-apt-ips-high.netset</a> — High confidence IPs (5+ OSINT sources)</div>
            <div class="file"><a href="blocklists/aptw-apt-ips-medium.netset">aptw-apt-ips-medium.netset</a> — Medium confidence (3+ sources)</div>
            <div class="file"><a href="blocklists/aptw-apt-ips-all.netset">aptw-apt-ips-all.netset</a> — All validated IPs</div>
            <div class="file"><a href="blocklists/aptw-apt-subnets.netset">aptw-apt-subnets.netset</a> — High-density subnets</div>
          </div>
          <div class="section">
            <h2>Domain Blocklists</h2>
            <div class="file"><a href="blocklists/aptw-apt-domains.hosts">aptw-apt-domains.hosts</a> — StevenBlack hosts format</div>
            <div class="file"><a href="blocklists/aptw-apt-domains-plain.txt">aptw-apt-domains-plain.txt</a> — Plain domain list (Pi-hole/DNS)</div>
            <div class="file"><a href="blocklists/aptw-apt-combined.hosts">aptw-apt-combined.hosts</a> — Combined IPs + domains</div>
          </div>
          <div class="section">
            <h2>Unified Blocklists (APT Watch + External Feeds)</h2>
            <div class="file"><a href="blocklists/aptw-full-ips.netset">aptw-full-ips.netset</a> — All threat IPs merged (APT Watch + FireHOL + AbuseIPDB)</div>
            <div class="file"><a href="blocklists/aptw-full-domains.hosts">aptw-full-domains.hosts</a> — All threat domains merged (hosts format, Pi-hole ready)</div>
            <div class="file"><a href="blocklists/aptw-full-domains-plain.txt">aptw-full-domains-plain.txt</a> — All threat domains (plain list)</div>
            <div class="file"><a href="blocklists/aptw-resolved-ips.netset">aptw-resolved-ips.netset</a> — IPs resolved from malicious domains</div>
            <div class="file"><a href="blocklists/aptw-reverse-dns.hosts">aptw-reverse-dns.hosts</a> — Reverse DNS of known-bad IPs</div>
            <div class="file"><a href="blocklists/aptw-mining.hosts">aptw-mining.hosts</a> — Cryptojacking mining pool domains</div>
          </div>
          <div class="section">
            <h2>Mining / Cryptojacking</h2>
            <div class="file"><a href="iocs/mining_domains.txt">mining_domains.txt</a> — Mining pool &amp; crypto exchange domains (56K+ entries)</div>
          </div>
          <div class="section">
            <h2>Raw IOC Files</h2>
            <div class="file"><a href="iocs/ipv4.txt">ipv4.txt</a> — All IPv4 IOCs</div>
            <div class="file"><a href="iocs/cidr.txt">cidr.txt</a> — CIDR ranges</div>
            <div class="file"><a href="iocs/domains.txt">domains.txt</a> — Domain IOCs</div>
            <div class="file"><a href="iocs/mining_domains.txt">mining_domains.txt</a> — Mining pool domains</div>
            <div class="file"><a href="iocs/emails.txt">emails.txt</a> — Email IOCs</div>
            <div class="file"><a href="iocs/urls.txt">urls.txt</a> — URL IOCs</div>
            <div class="file"><a href="iocs/cves.txt">cves.txt</a> — CVE references</div>
          </div>
          <div class="section">
            <h2>Interactive Dashboard</h2>
            <div class="file"><a href="index.html">Dashboard</a> — Full interactive analytics</div>
          </div>
          </body></html>
          FEEDSEOF

          echo "Pages content:"
          find web/ -type f | head -30

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: 'web/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
