name: OSINT Validation

# Manual only — the server runs validation automatically via systemd timer.
# Use this workflow to run additional validation from GitHub Actions
# (requires API keys in repo secrets).

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Source to run (shodan, otx, abuseipdb, virustotal, censys, all, auto)'
        required: false
        default: 'auto'
      limit:
        description: 'Max IPs per source (ignored for auto)'
        required: false
        default: '100'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Check database exists
        run: |
          if [ ! -f database/apt_intel.db ]; then
            echo "::error::No database found at database/apt_intel.db."
            echo "This workflow requires the full database."
            echo "For normal operation, use the server-side validation (systemd timer)."
            exit 1
          fi

      - name: Generate config.ini (github mode)
        run: |
          cat > config.ini << 'EOF'
          [general]
          mode = github

          [validation]
          runs_per_day = 4
          validated_threshold = 3
          shodan_daily = 2000
          otx_daily = 2000
          abuseipdb_daily = 1000
          virustotal_daily = 500
          censys_daily = 10

          [continuous]
          shodan_standalone = false
          validate_interval_minutes = 30
          import_interval_minutes = 5
          EOF

      - name: Validate inputs
        env:
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          # Whitelist allowed source values
          case "$INPUT_SOURCE" in
            auto|all|shodan|otx|abuseipdb|virustotal|censys) ;;
            *)
              echo "::error::Invalid source: $INPUT_SOURCE"
              exit 1
              ;;
          esac

          # Validate limit is a positive integer
          if ! echo "$INPUT_LIMIT" | grep -qE '^[0-9]+$'; then
            echo "::error::Invalid limit (must be a number): $INPUT_LIMIT"
            exit 1
          fi
          if [ "$INPUT_LIMIT" -gt 10000 ]; then
            echo "::error::Limit too high (max 10000): $INPUT_LIMIT"
            exit 1
          fi

      - name: Run validation
        env:
          OTX_API_KEY: ${{ secrets.OTX_API_KEY }}
          ABUSEIPDB_KEY: ${{ secrets.ABUSEIPDB_KEY }}
          VIRUSTOTAL_KEY: ${{ secrets.VIRUSTOTAL_KEY }}
          CENSYS_API_TOKEN: ${{ secrets.CENSYS_API_TOKEN }}
          INPUT_SOURCE: ${{ github.event.inputs.source }}
          INPUT_LIMIT: ${{ github.event.inputs.limit }}
        run: |
          SOURCE="${INPUT_SOURCE:-auto}"
          LIMIT="${INPUT_LIMIT:-100}"

          if [ "$SOURCE" = "auto" ]; then
            python apt.py validate auto
          elif [ "$SOURCE" = "all" ]; then
            python apt.py validate run all "$LIMIT"
          else
            python apt.py validate queue 500
            python apt.py validate run "$SOURCE" "$LIMIT"
          fi

      - name: Show status
        run: python apt.py validate status

      - name: Summary
        if: always()
        run: |
          echo "## Validation Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          python apt.py validate status 2>&1 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
