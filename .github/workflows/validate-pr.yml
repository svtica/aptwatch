name: Validate Community Submission

on:
  pull_request:
    paths:
      - 'community/submissions/**'

permissions:
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install pyyaml
        run: pip install 'pyyaml==6.0.2'

      - name: Check submission files only
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Ensure PR only touches community/submissions/
          CHANGED=$(git diff --name-only "origin/${BASE_REF}...HEAD")
          echo "Changed files:"
          echo "$CHANGED"

          # Block executable files
          for f in $CHANGED; do
            if [ -f "$f" ] && [ -x "$f" ]; then
              echo "::error::Executable file not allowed: $f"
              exit 1
            fi
            # Block non-YAML in submissions/
            case "$f" in
              community/submissions/*.yaml|community/submissions/*.yml) ;;
              community/submissions/.gitkeep) ;;
              community/submissions/*)
                echo "::error::Non-YAML file in submissions/: $f"
                exit 1
                ;;
            esac
          done

          UNSAFE=$(echo "$CHANGED" | grep -v '^community/submissions/' | grep -v '^$' || true)
          if [ -n "$UNSAFE" ]; then
            echo "::error::PR modifies files outside community/submissions/:"
            echo "$UNSAFE"
            echo ""
            echo "Community submissions must only add files in community/submissions/"
            exit 1
          fi

          # Check file sizes (max 100KB)
          for f in $CHANGED; do
            if [ -f "$f" ]; then
              size=$(stat -c%s "$f" 2>/dev/null || stat -f%z "$f" 2>/dev/null || echo 0)
              if [ "$size" -gt 102400 ]; then
                echo "::error::File too large (${size} bytes, max 100KB): $f"
                exit 1
              fi
            fi
          done

      - name: Validate submissions
        run: python community/validate_submission.py

      - name: Comment on PR
        if: always()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { execSync } = require('child_process');
            let output;
            try {
              output = execSync('python community/validate_submission.py 2>&1', {
                timeout: 30000
              }).toString();
            } catch (e) {
              output = e.stdout ? e.stdout.toString() : 'Validation failed';
            }

            // Truncate output to prevent abuse via massive YAML
            if (output.length > 5000) {
              output = output.substring(0, 5000) + '\n... (truncated)';
            }

            const hasSecurity = output.includes('SECURITY');
            const passed = output.includes('PASSED') && !hasSecurity;
            const emoji = hasSecurity ? '🚫' : (passed ? '✅' : '❌');
            const status = hasSecurity ? 'Security Issue Detected' : (passed ? 'Validation Passed' : 'Validation Failed');

            const body = `## ${emoji} ${status}\n\n\`\`\`\n${output}\n\`\`\`\n\n` +
              (hasSecurity
                ? '> ⚠️ **This submission was flagged for security reasons.** A maintainer will review.'
                : passed
                  ? '> This submission looks good. A maintainer will review and import the IOCs.'
                  : '> Please fix the errors above and push again.');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
