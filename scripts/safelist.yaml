# =============================================================
# APT Watch — Safelist (Allowlist)
# =============================================================
# IPs, domains, emails and patterns to EXCLUDE from IOC collection.
# Loaded by aptwatch_ioc_collector.py and usable by any
# pipeline script to filter false positives.
#
# Categories:
#   ips          : Individual IPs to exclude
#   ip_ranges    : CIDR prefixes / private ranges
#   domains      : Exact legitimate domains
#   domain_patterns : Substrings to match (contains)
#   emails       : Email addresses to exclude
#   asns         : Legitimate ASNs (CDN, cloud) not to block
#
# Principles:
#   - Add here rather than hardcode in scripts
#   - Document the reason for each entry
#   - Reload on each run (no cache)
#
# Last updated: 2026-04-01
# =============================================================

# --- Known individual False Positive IPs ---
ips:
  # DNS publics
  - "8.8.8.8"          # Google DNS
  - "8.8.4.4"          # Google DNS
  - "1.1.1.1"          # Cloudflare DNS
  - "1.0.0.1"          # Cloudflare DNS
  - "9.9.9.9"          # Quad9 DNS
  - "208.67.222.222"   # OpenDNS
  - "208.67.220.220"   # OpenDNS
  - "9.7.4.4"          # OTX artifact - not a real IOC
  # Legitimate CDN / cloud frequently extracted by mistake
  - "23.52.43.176"     # Akamai CDN
  - "34.41.59.0"       # Google Cloud
  - "0.0.0.0"          # Not routable
  - "255.255.255.255"  # Broadcast

